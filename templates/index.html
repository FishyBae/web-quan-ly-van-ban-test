{% extends "base.html" %}
{% block content %}

<h3>Xin chào {{user}}</h3>

<div class="row">
{% for file in files %}
  <div class="col-md-4">
    <div class="card p-3 mb-3">
      <h5>{{file.filename}}</h5>
      <a class="btn btn-success" href="/uploads/{{file.filename}}">Download</a>
    </div>
  </div>
{% endfor %}
</div>

{% endblock %}
